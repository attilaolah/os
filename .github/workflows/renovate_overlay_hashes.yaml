name: Renovate overlay hash refresh

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refresh-overlay-hashes:
    if: >-
      github.actor == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          auto-optimise-store = true
          experimental-features = nix-command flakes

    - name: Refresh hashes for changed overlays
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        base_ref='${{ github.event.pull_request.base.ref }}'
        git fetch --no-tags --depth=1 origin "${base_ref}"

        changed_overlays="$(git diff --name-only "origin/${base_ref}...HEAD" -- overlays/*.nix || true)"
        if [[ -z "${changed_overlays}" ]]; then
          echo 'No overlay file changes detected.'
          exit 0
        fi

        collect_hash_keys() {
          local overlay="$1"
          # Dependency hashes are derived from the fetched source tree.
          grep -E "^[[:space:]]*hash(-[A-Za-z0-9._-]+)?[[:space:]]*=[[:space:]]*\"sha256-[A-Za-z0-9+/]{43}=\"" "${overlay}" \
            | sed -E "s/^[[:space:]]*(hash(-[A-Za-z0-9._-]+)?)[[:space:]]*=.*/\\1/" \
            | awk '
              !seen[$0]++ {
                keys[++n] = $0;
                source_first[$0] = ($0 == "hash" || $0 ~ /^hash-src($|-)/);
              }
              END {
                for (pass = 1; pass >= 0; pass--) {
                  for (i = 1; i <= n; i++) {
                    if (source_first[keys[i]] == pass) {
                      print keys[i];
                    }
                  }
                }
              }
            ' || true
        }

        refresh_antigravity_source_urls() {
          local overlay="$1"
          local version
          local release_json
          local url_linux_x64
          local url_linux_arm64
          local url_mac_arm64
          local url_mac_x64
          local tmp_file

          version="$(sed -nE 's/^[[:space:]]*github-tags[[:space:]]*=[[:space:]]*\[[[:space:]]*"google-antigravity\/antigravity-cli"[[:space:]]+"([^"]+)"[[:space:]]*\][[:space:]]*;.*/\1/p' "${overlay}" | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to extract antigravity version from ${overlay}." >&2
            exit 1
          fi

          release_json="$(
            curl -fsSL \
              -H "accept: application/vnd.github+json" \
              --oauth2-bearer "${GH_TOKEN}" \
              "https://api.github.com/repos/google-antigravity/antigravity-cli/releases/tags/${version}"
          )"
          url_linux_x64="$(jq -r '.assets[] | select(.name == "agy_cli_linux_x64.tar.gz") | .browser_download_url' <<< "${release_json}")"
          url_linux_arm64="$(jq -r '.assets[] | select(.name == "agy_cli_linux_arm64.tar.gz") | .browser_download_url' <<< "${release_json}")"
          url_mac_arm64="$(jq -r '.assets[] | select(.name == "agy_cli_mac_arm64.tar.gz") | .browser_download_url' <<< "${release_json}")"
          url_mac_x64="$(jq -r '.assets[] | select(.name == "agy_cli_mac_x64.tar.gz") | .browser_download_url' <<< "${release_json}")"

          if [[ -z "${url_linux_x64}" || -z "${url_linux_arm64}" || -z "${url_mac_arm64}" || -z "${url_mac_x64}" ]]; then
            echo "Release ${version} is missing one or more expected antigravity assets." >&2
            exit 1
          fi

          tmp_file="$(mktemp)"
          if ! awk \
            -v url_linux_x64="${url_linux_x64}" \
            -v url_linux_arm64="${url_linux_arm64}" \
            -v url_mac_arm64="${url_mac_arm64}" \
            -v url_mac_x64="${url_mac_x64}" '
            BEGIN { found = 0; }
            {
              if ($0 ~ "^[[:space:]]*source-url-x86_64-linux[[:space:]]*=") {
                $0 = "  source-url-x86_64-linux = \"" url_linux_x64 "\";";
                found++;
              } else if ($0 ~ "^[[:space:]]*source-url-aarch64-linux[[:space:]]*=") {
                $0 = "  source-url-aarch64-linux = \"" url_linux_arm64 "\";";
                found++;
              } else if ($0 ~ "^[[:space:]]*source-url-aarch64-darwin[[:space:]]*=") {
                $0 = "  source-url-aarch64-darwin = \"" url_mac_arm64 "\";";
                found++;
              } else if ($0 ~ "^[[:space:]]*source-url-x86_64-darwin[[:space:]]*=") {
                $0 = "  source-url-x86_64-darwin = \"" url_mac_x64 "\";";
                found++;
              }
              print;
            }
            END {
              if (found != 4) {
                exit 42;
              }
            }
          ' "${overlay}" > "${tmp_file}"; then
            rm -f "${tmp_file}"
            echo "Failed to update source URL variables in ${overlay}." >&2
            exit 1
          fi
          mv "${tmp_file}" "${overlay}"
        }

        mapping_for_hash_key() {
          local package_name="$1"
          local key="$2"
          local suffix

          if [[ "${key}" == 'hash' ]]; then
            suffix='src'
          else
            suffix="${key#hash-}"
          fi

          echo "${key}=${package_name}-${suffix}"
        }

        updated_any='false'
        while IFS= read -r overlay; do
          [[ -z "${overlay}" ]] && continue

          package_name="$(basename "${overlay}" .nix | tr '_' '-')"
          mappings=()

          if [[ "${overlay}" == 'overlays/antigravity_cli.nix' ]]; then
            refresh_antigravity_source_urls "${overlay}"
          fi

          while IFS= read -r key; do
            [[ -z "${key}" ]] && continue
            mappings+=("$(mapping_for_hash_key "${package_name}" "${key}")")
          done < <(collect_hash_keys "${overlay}")

          if [[ "${#mappings[@]}" -eq 0 ]]; then
            echo "No hash keys detected in ${overlay}; skipping."
            continue
          fi

          ./.github/scripts/update_overlay_hashes.sh "${overlay}" "${mappings[@]}"
          updated_any='true'
        done <<< "${changed_overlays}"

        if [[ "${updated_any}" != 'true' ]]; then
          echo 'No mapped overlay hash updates required.'
        fi

    - name: Commit hash updates via GitHub API (GitHub-signed)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        if git diff --quiet -- overlays; then
          echo 'No hash updates needed.'
          exit 0
        fi

        branch='${{ github.event.pull_request.head.ref }}'
        repo='${{ github.repository }}'
        message='chore(renovate): refresh overlay hashes'

        expected_head_oid="$(gh api "repos/${repo}/git/ref/heads/${branch}" --jq '.object.sha')"

        additions_json="$(
          git diff --name-only -- overlays \
            | while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                contents="$(base64 < "${path}" | tr -d '\n')"
                jq -n --arg path "${path}" --arg contents "${contents}" \
                  '{path: $path, contents: $contents}'
              done \
            | jq -s .
        )"

        mutation='
          mutation($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) {
              commit {
                oid
              }
            }
          }
        '

        commit_oid="$(
          jq -n \
            --arg query "${mutation}" \
            --arg repo "${repo}" \
            --arg branch "${branch}" \
            --arg expected_head_oid "${expected_head_oid}" \
            --arg message "${message}" \
            --argjson additions "${additions_json}" \
            '{
              query: $query,
              variables: {
                input: {
                  branch: {
                    repositoryNameWithOwner: $repo,
                    branchName: $branch
                  },
                  expectedHeadOid: $expected_head_oid,
                  message: {
                    headline: $message
                  },
                  fileChanges: {
                    additions: $additions
                  }
                }
              }
            }' \
            | gh api graphql --input - --jq '.data.createCommitOnBranch.commit.oid'
        )"

        verification="$(
          gh api "repos/${repo}/commits/${commit_oid}" \
            --jq '.commit.verification.reason'
        )"

        if [[ "${verification}" != 'valid' ]]; then
          echo "Commit ${commit_oid} was not GitHub-verified (reason: ${verification})." >&2
          exit 1
        fi
