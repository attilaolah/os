name: Renovate overlay hash refresh

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refresh-overlay-hashes:
    if: >-
      github.actor == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          auto-optimise-store = true
          experimental-features = nix-command flakes

    - name: Refresh hashes for changed overlays
      run: |
        set -euo pipefail

        base_ref='${{ github.event.pull_request.base.ref }}'
        git fetch --no-tags --depth=1 origin "${base_ref}"

        changed_overlays="$(git diff --name-only "origin/${base_ref}...HEAD" -- overlays/*.nix || true)"
        if [[ -z "${changed_overlays}" ]]; then
          echo 'No overlay file changes detected.'
          exit 0
        fi

        collect_hash_keys() {
          local overlay="$1"
          grep -E "^[[:space:]]*hash(-[A-Za-z0-9._-]+)?[[:space:]]*=[[:space:]]*\"sha256-[A-Za-z0-9+/]{43}=\"" "${overlay}" \
            | sed -E "s/^[[:space:]]*(hash(-[A-Za-z0-9._-]+)?)[[:space:]]*=.*/\\1/" \
            | sort -u || true
        }

        refresh_antigravity_build() {
          local overlay="$1"
          local version
          local manifest_url='https://antigravity-cli-auto-updater-974169037036.us-central1.run.app/manifests/linux_amd64.json'
          local manifest_json
          local manifest_version
          local published_url
          local published_version_build
          local published_build
          local tmp_file

          version="$(sed -nE 's/^[[:space:]]*github-tags[[:space:]]*=[[:space:]]*\[[[:space:]]*"google-antigravity\/antigravity-cli"[[:space:]]+"([^"]+)"[[:space:]]*\][[:space:]]*;.*/\1/p' "${overlay}" | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to extract antigravity version from ${overlay}." >&2
            exit 1
          fi

          manifest_json="$(curl -fsSL "${manifest_url}")"
          manifest_version="$(jq -r '.version // empty' <<< "${manifest_json}")"
          published_url="$(jq -r '.url // empty' <<< "${manifest_json}")"
          if [[ -z "${manifest_version}" || -z "${published_url}" ]]; then
            echo "Failed to parse antigravity manifest from ${manifest_url}." >&2
            exit 1
          fi

          if [[ "${manifest_version}" != "${version}" ]]; then
            echo "Antigravity manifest is for ${manifest_version} but overlay targets ${version}; cannot safely derive build." >&2
            exit 1
          fi

          published_version_build="$(sed -nE 's@.*/antigravity-cli/([0-9]+\\.[0-9]+\\.[0-9]+-[0-9]+)/.*@\\1@p' <<< "${published_url}")"
          if [[ -z "${published_version_build}" || "${published_version_build}" != "${version}-"* ]]; then
            echo "Failed to extract version-build token from antigravity URL: ${published_url}" >&2
            exit 1
          fi
          published_build="${published_version_build#${version}-}"

          tmp_file="$(mktemp)"
          if ! awk -v build="${published_build}" '
            BEGIN { found = 0; }
            {
              if ($0 ~ "^[[:space:]]*build[[:space:]]*=[[:space:]]*\"[0-9]+\";") {
                sub(/"[0-9]+"/, "\"" build "\"");
                found++;
              }
              print;
            }
            END {
              if (found != 1) {
                exit 42;
              }
            }
          ' "${overlay}" > "${tmp_file}"; then
            rm -f "${tmp_file}"
            echo "Failed to update build variable in ${overlay}." >&2
            exit 1
          fi
          mv "${tmp_file}" "${overlay}"
        }

        mapping_for_hash_key() {
          local package_name="$1"
          local key="$2"
          local suffix

          if [[ "${key}" == 'hash' ]]; then
            suffix='src'
          else
            suffix="${key#hash-}"
          fi

          echo "${key}=${package_name}-${suffix}"
        }

        updated_any='false'
        while IFS= read -r overlay; do
          [[ -z "${overlay}" ]] && continue

          package_name="$(basename "${overlay}" .nix | tr '_' '-')"
          mappings=()

          if [[ "${overlay}" == 'overlays/antigravity_cli.nix' ]]; then
            refresh_antigravity_build "${overlay}"
          fi

          while IFS= read -r key; do
            [[ -z "${key}" ]] && continue
            mappings+=("$(mapping_for_hash_key "${package_name}" "${key}")")
          done < <(collect_hash_keys "${overlay}")

          if [[ "${#mappings[@]}" -eq 0 ]]; then
            echo "No hash keys detected in ${overlay}; skipping."
            continue
          fi

          ./.github/scripts/update_overlay_hashes.sh "${overlay}" "${mappings[@]}"
          updated_any='true'
        done <<< "${changed_overlays}"

        if [[ "${updated_any}" != 'true' ]]; then
          echo 'No mapped overlay hash updates required.'
        fi

    - name: Commit hash updates via GitHub API (GitHub-signed)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        if git diff --quiet -- overlays; then
          echo 'No hash updates needed.'
          exit 0
        fi

        branch='${{ github.event.pull_request.head.ref }}'
        repo='${{ github.repository }}'
        message='chore(renovate): refresh overlay hashes'

        expected_head_oid="$(gh api "repos/${repo}/git/ref/heads/${branch}" --jq '.object.sha')"

        additions_json="$(
          git diff --name-only -- overlays \
            | while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                contents="$(base64 < "${path}" | tr -d '\n')"
                jq -n --arg path "${path}" --arg contents "${contents}" \
                  '{path: $path, contents: $contents}'
              done \
            | jq -s .
        )"

        mutation='
          mutation($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) {
              commit {
                oid
              }
            }
          }
        '

        commit_oid="$(
          jq -n \
            --arg query "${mutation}" \
            --arg repo "${repo}" \
            --arg branch "${branch}" \
            --arg expected_head_oid "${expected_head_oid}" \
            --arg message "${message}" \
            --argjson additions "${additions_json}" \
            '{
              query: $query,
              variables: {
                input: {
                  branch: {
                    repositoryNameWithOwner: $repo,
                    branchName: $branch
                  },
                  expectedHeadOid: $expected_head_oid,
                  message: {
                    headline: $message
                  },
                  fileChanges: {
                    additions: $additions
                  }
                }
              }
            }' \
            | gh api graphql --input - --jq '.data.createCommitOnBranch.commit.oid'
        )"

        verification="$(
          gh api "repos/${repo}/commits/${commit_oid}" \
            --jq '.commit.verification.reason'
        )"

        if [[ "${verification}" != 'valid' ]]; then
          echo "Commit ${commit_oid} was not GitHub-verified (reason: ${verification})." >&2
          exit 1
        fi
