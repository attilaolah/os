name: Renovate qwen-code hash refresh

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  qwen-code-hashes:
    if: >-
      github.actor == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          auto-optimise-store = true
          experimental-features = nix-command flakes

    - name: Detect qwen-code version updates
      id: detect
      run: |
        set -euo pipefail

        base_ref='${{ github.event.pull_request.base.ref }}'
        git fetch --no-tags --depth=1 origin "${base_ref}"

        if git diff --unified=0 "origin/${base_ref}...HEAD" -- overlays/qwen_code.nix | grep -qE '^[+-][[:space:]]*github-tags = \["QwenLM/qwen-code"'; then
          echo 'changed=true' >> "$GITHUB_OUTPUT"
        else
          echo 'changed=false' >> "$GITHUB_OUTPUT"
        fi

    - name: Update qwen-code hashes
      if: steps.detect.outputs.changed == 'true'
      run: ./.github/scripts/update_qwen_code_hashes.sh

    - name: Commit and push hash updates
      if: steps.detect.outputs.changed == 'true'
      run: |
        set -euo pipefail

        if git diff --quiet -- overlays/qwen_code.nix; then
          echo 'No hash updates needed.'
          exit 0
        fi

        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add overlays/qwen_code.nix
        git commit -m 'chore(qwen-code): update hashes'
        git push
